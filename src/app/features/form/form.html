<div class="form-page">
  <header class="form-header">
    <button class="btn-back" (click)="cancelar()">← Volver</button>
    <h2>{{ editId() ? 'Editar movimiento' : 'Nuevo movimiento' }}</h2>
  </header>

  <div class="form-body">

    <div class="field">
      <label>Orden *</label>
      <div class="toggle-group">
        <button class="toggle-btn" [class.active-compra]="f.orden === 'COMPRA'" (click)="setOrden('COMPRA')">Compra</button>
        <button class="toggle-btn" [class.active-venta]="f.orden === 'VENTA'"   (click)="setOrden('VENTA')">Venta</button>
      </div>
    </div>

    <div class="field">
      <label>Nombre del activo *</label>
      <input type="text" [value]="f.nombre" (input)="setField('nombre', $any($event.target).value)" placeholder="Ej: Apple Inc." />
    </div>

    <div class="field">
      <label>Símbolo / Abreviatura *</label>
      <input type="text" [value]="f.simbolo" (input)="setField('simbolo', $any($event.target).value)" placeholder="Ej: AAPL" style="text-transform: uppercase" />
    </div>

    <div class="field">
      <label>Tipo de activo *</label>
      <div class="toggle-group three">
        <button class="toggle-btn" [class.active-tipo]="f.tipo === 'ACCION'" (click)="setTipo('ACCION')">Acción</button>
        <button class="toggle-btn" [class.active-tipo]="f.tipo === 'CRIPTO'"  (click)="setTipo('CRIPTO')">Cripto</button>
        <button class="toggle-btn" [class.active-tipo]="f.tipo === 'ETF'"     (click)="setTipo('ETF')">ETF</button>
      </div>
    </div>

    <div class="field">
      <label>
        TRM *
        <span class="trm-hint" *ngIf="currency.trmLoaded()">
          (automática: {{ currency.formatCop(currency.trm()) }})
        </span>
      </label>
      <input type="number" [value]="f.trm" (input)="setField('trm', +$any($event.target).value)" placeholder="Ej: 4150" min="1" />
    </div>

    <div class="field">
      <label>Valor *</label>
      <div class="currency-row">
        <div class="currency-input">
          <span class="currency-label">USD</span>
          <input type="number" [value]="f.valor_usd"
            (input)="onUsdChange(+$any($event.target).value)"
            placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="currency-input">
          <span class="currency-label">COP</span>
          <input type="number" [value]="f.valor_cop"
            (input)="onCopChange(+$any($event.target).value)"
            placeholder="0" min="0" />
        </div>
      </div>
      <p class="field-hint">Ingresa en cualquiera de las dos — se convierte automáticamente</p>
    </div>

    <div class="field">
      <label>Fecha *</label>
      <input type="date" [value]="f.fecha" (input)="setField('fecha', $any($event.target).value)" />
    </div>

    <div class="field">
      <label>Hora</label>
      <input type="time" [value]="f.hora" (input)="setField('hora', $any($event.target).value)" />
    </div>

    <div class="field">
      <label>Notas <span class="optional">(opcional)</span></label>
      <textarea [value]="f.notas || ''" (input)="setField('notas', $any($event.target).value)" placeholder="Ej: Compra por DCA mensual..." rows="3"></textarea>
    </div>

    <div class="form-error" *ngIf="error()">{{ error() }}</div>

    <div class="form-actions">
      <button class="btn-cancel" (click)="cancelar()">Cancelar</button>
      <button class="btn-save" (click)="guardar()" [disabled]="saving()">
        {{ saving() ? 'Guardando…' : (editId() ? 'Actualizar' : 'Guardar') }}
      </button>
    </div>
  </div>
</div>
