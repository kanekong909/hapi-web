<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">📈</div>
    <h1>Hapi Tracker</h1>
    <p class="auth-sub">Inicia sesión para continuar</p>

    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="tu@email.com" [value]="email" (input)="onEmail($event)" />
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••" [value]="password" (input)="onPassword($event)" />
    </div>

    <div class="auth-error" *ngIf="error()">{{ error() }}</div>

    <button class="btn-primary" (click)="entrar()" [disabled]="loading()">
      {{ loading() ? 'Entrando…' : 'Entrar' }}
    </button>

    <p class="auth-link">¿No tienes cuenta? <a routerLink="/auth/registro">Regístrate</a></p>
  </div>
</div>
